run:
  timeout: 5m
  tests: true
  build-tags:
    - integration

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - gocritic
    - bodyclose
    - errorlint
    - gosec
    - misspell
    - nilerr
    - prealloc
    - unconvert
    - unparam
    - whitespace

linters-settings:
  errorlint:
    errorf: true
    asserts: true
    comparison: true
  revive:
    rules:
      - name: exported
      - name: error-return
      - name: error-naming
      - name: var-naming
      - name: package-comments

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck